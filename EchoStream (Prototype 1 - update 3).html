<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EchoStream — Search, Auto-fill, Edit & Delete</title>
  <style>
    :root{--bg:#0b0d10;--panel:#0f1417;--muted:#95a0a8;--accent:#0f9d58;--glass:rgba(255,255,255,0.03)}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;color:#e6eef6;background:linear-gradient(180deg,#050608 0%, #0b0d10 100%)}
    .app{display:flex;gap:16px;padding:16px;box-sizing:border-box}
    .sidebar{width:360px;padding:14px;border-radius:12px;background:var(--panel);box-shadow:0 6px 24px rgba(0,0,0,0.6);display:flex;flex-direction:column}
    h1{margin:0 0 8px;color:var(--accent);font-size:20px}
    .search-row{display:flex;gap:8px;margin-bottom:8px}
    .search-row input{flex:1;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:#fff}
    .uploader{border:2px dashed rgba(255,255,255,0.04);padding:10px;border-radius:8px;text-align:center;color:var(--muted);cursor:pointer;background:var(--glass)}
    .file-list{margin-top:12px;overflow:auto;flex:1;padding-right:6px}
    .song{display:flex;gap:10px;padding:8px;border-radius:8px;align-items:center;margin-bottom:8px;background:linear-gradient(180deg, rgba(255,255,255,0.01), transparent);cursor:pointer}
    .song img{width:56px;height:56px;border-radius:8px;object-fit:cover;background:#081010}
    .meta{flex:1;min-width:0}
    .meta .title{font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .meta .sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .song .actions{display:flex;flex-direction:column;gap:6px}
    .btn{background:transparent;border:1px solid rgba(255,255,255,0.03);color:#eaf7ee;padding:6px 8px;border-radius:8px;cursor:pointer;font-size:13px}
    .btn.primary{background:linear-gradient(90deg,var(--accent),#2fd27a);border:0;color:#04210b}
    .main{flex:1;display:flex;flex-direction:column;gap:12px}
    .controls{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;background:linear-gradient(90deg, rgba(255,255,255,0.01), transparent)}
    canvas{width:100%;height:200px;border-radius:8px;background:#050607}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:60}
    .modal{background:var(--panel);padding:16px;border-radius:10px;min-width:320px;max-width:92%}
    .input-row{display:flex;flex-direction:column;margin-bottom:8px}
    .input-row label{font-size:12px;color:var(--muted);margin-bottom:6px}
    .input-row input, .input-row select, .input-row textarea{padding:8px;border-radius:6px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:#fff}
    .cover-preview{width:96px;height:96px;border-radius:8px;background:#081010;object-fit:cover;border:1px solid rgba(255,255,255,0.03)}
    footer{color:var(--muted);font-size:12px;padding:12px;text-align:center}
    .small{font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="app" role="application">
    <div class="sidebar" aria-label="Library">
      <h1>EchoStream</h1>

      <div class="search-row">
        <input id="searchInput" placeholder="Search local library (title, artist, album)" aria-label="Search songs" />
        <button id="clearSearch" class="btn">Clear</button>
      </div>

      <div id="uploader" class="uploader" tabindex="0">
        Drop audio files here or click to select
        <div class="small">MP3 / WAV / OGG / FLAC — will attempt online lookup by filename</div>
        <input id="fileInput" type="file" multiple accept="audio/*" style="display:none" />
      </div>

      <div class="file-list" id="fileList" aria-live="polite"></div>
    </div>

    <div class="main">
      <div class="controls" aria-label="Player controls">
        <div style="display:flex;gap:8px;align-items:center;">
          <button id="playBtn" class="btn primary">Play / Pause</button>
          <button id="prevBtn" class="btn">Prev</button>
          <button id="nextBtn" class="btn">Next</button>
        </div>
        <div style="flex:1">
          <div id="nowPlaying" class="small">No track loaded</div>
          <input id="seek" type="range" min="0" max="100" value="0" style="width:100%" />
        </div>
        <div style="width:220px;display:flex;gap:8px;align-items:center;justify-content:flex-end">
          <div id="coverWrap" style="width:56px;height:56px;border-radius:8px;overflow:hidden;background:#061010"></div>
          <div style="text-align:right">
            <div id="trackTitle" style="font-weight:700"></div>
            <div id="trackSub" class="small"></div>
          </div>
        </div>
      </div>

      <canvas id="vizCanvas"></canvas>

      <div style="display:flex;gap:12px;align-items:flex-start">
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <strong>Lyrics</strong>
            <button id="fetchLyrics" class="btn">Fetch</button>
          </div>
          <div id="lyrics" style="white-space:pre-wrap;max-height:40vh;overflow:auto;padding:8px;border-radius:8px;background:rgba(255,255,255,0.02);margin-top:8px">No lyrics</div>
        </div>

        <div style="width:320px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <strong>AI Playlist</strong>
            <div class="small">local / server</div>
          </div>
          <div style="margin-top:8px;display:flex;gap:8px">
            <select id="moodSelect" class="btn" style="flex:1">
              <option value="chill">Chill</option>
              <option value="energetic">Energetic</option>
              <option value="focus">Focus</option>
              <option value="dance">Dance</option>
              <option value="heavy">Heavy</option>
              <option value="moody">Moody</option>
              <option value="luveley">Luveley</option>
              <option value="dreamy">Dreamy</option>
              <option value="aggressive">Aggressive</option>
              <option value="mellow">Mellow</option>
            </select>
            <button id="genPlaylist" class="btn primary">Generate</button>
          </div>
          <ol id="aiPlaylist" style="margin-top:10px;color:var(--muted)"></ol>
        </div>
      </div>

      <footer>Prototype — for production use server-side proxies for AI & lyrics (keep keys off the client).</footer>
    </div>
  </div>

  <!-- Edit / Confirm modal -->
  <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true">
    <div class="modal" role="document" aria-labelledby="modalTitle">
      <h3 id="modalTitle">Edit song metadata</h3>
      <div style="display:flex;gap:12px">
        <div style="flex:1">
          <div class="input-row"><label>Title</label><input id="metaTitle" /></div>
          <div class="input-row"><label>Artist</label><input id="metaArtist" /></div>
          <div class="input-row"><label>Album</label><input id="metaAlbum" /></div>
          <div class="input-row"><label>Genre</label><input id="metaGenre" /></div>
          <div class="input-row"><label>Notes (optional)</label><textarea id="metaNotes" rows="3"></textarea></div>
          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button id="modalCancel" class="btn">Cancel</button>
            <button id="modalSave" class="btn primary">Save</button>
          </div>
        </div>
        <div style="width:120px;display:flex;flex-direction:column;gap:8px;align-items:center">
          <img id="metaCoverPreview" class="cover-preview" alt="cover preview" />
          <input id="metaCoverInput" type="file" accept="image/*" />
          <label class="small"><input id="metaRemoveCover" type="checkbox" /> Remove cover</label>
        </div>
      </div>
    </div>
  </div>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.2/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/node-vibrant@3.2.0/dist/vibrant.min.js"></script>

  <script type="module">
  // EchoStream — add search, auto-fill via iTunes, edit & delete
  // Notes:
  // - Uses public iTunes Search API for auto-fill (no key). If iTunes returns a plausible match, user is prompted to accept.
  // - When no plausible match, user is shown the Edit modal to type their own info.
  // - Songs (audio blobs) and cover images stored in IndexedDB (Dexie).
  // - Deleting a song removes associated blobs.
  // - Search field filters local library in real-time.

  // Try to load music-metadata-browser for tag extraction (optional)
  let mm = null;
  try { mm = await import('https://cdn.jsdelivr.net/npm/music-metadata-browser@2.6.1/dist/music-metadata-browser.esm.js'); }
  catch(e){ mm = null; console.warn('music-metadata-browser not loaded, filename fallback will be used'); }

  // DB
  const db = new Dexie('echostreamDB');
  db.version(1).stores({
    songs: '++id, title, artist, album, genre, fileName, createdAt',
    blobs: '&key'
  });

  // Helpers
  async function saveSongFile(file, metadata = {}) {
    const key = `file-${Date.now()}-${Math.random().toString(36).slice(2,9)}`;
    await db.table('blobs').put({ key, blob: file });
    const song = {
      title: metadata.title || file.name,
      artist: metadata.artist || '',
      album: metadata.album || '',
      genre: metadata.genre || '',
      coverKey: metadata.coverKey || null,
      fileName: file.name,
      duration: metadata.duration || null,
      createdAt: Date.now(),
      blobKey: key,
      liked: false
    };
    const id = await db.table('songs').add(song);
    return { id, song };
  }
  async function getBlob(key) { const r = await db.table('blobs').get(key); return r?.blob || null; }
  async function deleteBlobKey(key) { try { await db.table('blobs').delete(key); } catch(e){} }

  // UI refs
  const fileInput = document.getElementById('fileInput');
  const uploader = document.getElementById('uploader');
  const fileList = document.getElementById('fileList');
  const searchInput = document.getElementById('searchInput');
  const clearSearch = document.getElementById('clearSearch');

  const playBtn = document.getElementById('playBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const seek = document.getElementById('seek');
  const nowPlaying = document.getElementById('nowPlaying');
  const coverWrap = document.getElementById('coverWrap');
  const trackTitle = document.getElementById('trackTitle');
  const trackSub = document.getElementById('trackSub');
  const vizCanvas = document.getElementById('vizCanvas');
  const fetchLyrics = document.getElementById('fetchLyrics');

  // Modal refs
  const modalBackdrop = document.getElementById('modalBackdrop');
  const metaTitle = document.getElementById('metaTitle');
  const metaArtist = document.getElementById('metaArtist');
  const metaAlbum = document.getElementById('metaAlbum');
  const metaGenre = document.getElementById('metaGenre');
  const metaNotes = document.getElementById('metaNotes');
  const metaCoverInput = document.getElementById('metaCoverInput');
  const metaCoverPreview = document.getElementById('metaCoverPreview');
  const metaRemoveCover = document.getElementById('metaRemoveCover');
  const modalCancel = document.getElementById('modalCancel');
  const modalSave = document.getElementById('modalSave');

  // Audio + visuals (simplified)
  const audio = new Audio();
  audio.crossOrigin = 'anonymous';
  let audioContext = null, analyser = null, sourceNode = null, rafId = null;
  function ensureAudioContext() {
    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      sourceNode = audioContext.createMediaElementSource(audio);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 2048;
      sourceNode.connect(analyser);
      analyser.connect(audioContext.destination);
    }
  }
  const vctx = vizCanvas.getContext('2d');

  // App state
  let currentSong = null;
  let queue = [];
  let currentIndex = 0;
  let allSongsCache = []; // last loaded songs for filtering

  // UTIL: parse filename "Artist - Title.ext" -> {artist, title}
  function parseFilename(name) {
    const base = name.replace(/\.[^/.]+$/, '');
    // try common separators
    const parts = base.split(/ - |_/).map(s=>s.trim()).filter(Boolean);
    if (parts.length >= 2) return { artist: parts[0], title: parts.slice(1).join(' - ') };
    // try parentheses "Title (Artist)"
    const paren = base.match(/(.+)\(([^)]+)\)$/);
    if (paren) return { artist: paren[2].trim(), title: paren[1].trim() };
    // single part fallback
    return { artist: '', title: base };
  }

  // UTIL: simple similarity check
  function simpleMatch(a,b){
    if(!a||!b) return false;
    return a.toLowerCase().includes(b.toLowerCase()) || b.toLowerCase().includes(a.toLowerCase());
  }

  // AUTO-LOOKUP: iTunes Search API (no API key). returns first result or null.
  async function lookupItunes({title, artist}) {
    const termParts = [];
    if (artist) termParts.push(artist);
    if (title) termParts.push(title);
    if (!termParts.length) return null;
    const term = encodeURIComponent(termParts.join(' '));
    const url = `https://itunes.apple.com/search?term=${term}&media=music&entity=song&limit=6`;
    try {
      const res = await fetch(url);
      if (!res.ok) return null;
      const j = await res.json();
      if (!j.results || !j.results.length) return null;
      // score results: prefer matches where both artist & title are similar
      for (const r of j.results) {
        const track = r.trackName || '';
        const artistName = r.artistName || '';
        if ((title && simpleMatch(track,title)) && (artist && simpleMatch(artistName,artist))) {
          return {
            title: track,
            artist: artistName,
            album: r.collectionName || '',
            genre: r.primaryGenreName || '',
            artwork: r.artworkUrl100 ? r.artworkUrl100.replace(/100x100bb.jpg$/, '600x600bb.jpg') : null
          };
        }
      }
      // fallback: return first result if title similar
      const r0 = j.results[0];
      if (r0 && (title ? simpleMatch(r0.trackName, title) : true)) {
        return {
          title: r0.trackName || '',
          artist: r0.artistName || '',
          album: r0.collectionName || '',
          genre: r0.primaryGenreName || '',
          artwork: r0.artworkUrl100 ? r0.artworkUrl100.replace(/100x100bb.jpg$/, '600x600bb.jpg') : null
        };
      }
    } catch (err) { console.warn('iTunes lookup failed', err); }
    return null;
  }

  // convert remote image URL -> blob and save as blobKey
  async function saveCoverFromUrl(url) {
    try {
      const res = await fetch(url);
      if (!res.ok) return null;
      const blob = await res.blob();
      const key = `cover-${Date.now()}-${Math.random().toString(36).slice(2,9)}`;
      await db.table('blobs').put({ key, blob });
      return key;
    } catch (err) { console.warn('cover fetch failed', err); return null; }
  }

  // Render library (with search filter)
  async function loadAndRender(filter='') {
    const songs = await db.table('songs').orderBy('createdAt').reverse().toArray();
    allSongsCache = songs;
    renderList(songs, filter);
  }

  async function renderList(songs, filter) {
    const q = (filter||'').trim().toLowerCase();
    fileList.innerHTML = '';
    for (const s of songs) {
      const t = `${s.title} ${s.artist} ${s.album}`.toLowerCase();
      if (q && !t.includes(q)) continue;
      const el = document.createElement('div'); el.className='song';
      const img = document.createElement('img'); img.alt='';
      if (s.coverKey) {
        const b = await getBlob(s.coverKey);
        if (b) { const url = URL.createObjectURL(b); img.src = url; img.onload = ()=>URL.revokeObjectURL(url); }
      } else { img.src = ''; }
      const meta = document.createElement('div'); meta.className='meta';
      meta.innerHTML = `<div class="title">${escapeHtml(s.title)}</div><div class="sub">${escapeHtml(s.artist)} • ${escapeHtml(s.album)}</div>`;
      const actions = document.createElement('div'); actions.className='actions';
      const play = document.createElement('button'); play.className='btn'; play.textContent='Play';
      const edit = document.createElement('button'); edit.className='btn'; edit.textContent='Edit';
      const del = document.createElement('button'); del.className='btn'; del.textContent='Delete';
      actions.appendChild(play); actions.appendChild(edit); actions.appendChild(del);
      el.appendChild(img); el.appendChild(meta); el.appendChild(actions);
      // events
      play.addEventListener('click', (e)=>{ e.stopPropagation(); enqueueAndPlay(s.id); });
      edit.addEventListener('click', async (e)=>{ e.stopPropagation(); await openEditModalForSong(s.id); });
      del.addEventListener('click', async (e)=>{ e.stopPropagation(); await deleteSong(s.id); });
      el.addEventListener('click', ()=>{ enqueueAndPlay(s.id); });
      fileList.appendChild(el);
    }
  }

  function escapeHtml(str){ if(!str) return ''; return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  // Upload flow: parse filename, try mm metadata, then try iTunes auto-lookup.
  uploader.addEventListener('click', ()=>fileInput.click());
  uploader.addEventListener('dragover', e=>{ e.preventDefault(); uploader.style.borderColor='rgba(255,255,255,0.12)';});
  uploader.addEventListener('dragleave', e=>{ uploader.style.borderColor=''; });
  uploader.addEventListener('drop', async e=>{ e.preventDefault(); uploader.style.borderColor=''; if (e.dataTransfer && e.dataTransfer.files) await handleFiles(e.dataTransfer.files); });
  fileInput.addEventListener('change', async (e)=>{ if (e.target.files) await handleFiles(e.target.files); e.target.value=''; });

  async function handleFiles(fileList) {
    const files = Array.from(fileList);
    for (const f of files) {
      // try reading embedded tags first
      let meta = {};
      if (mm && mm.parseBlob) {
        try {
          const parsed = await mm.parseBlob(f);
          const common = parsed.common || {};
          if (common.title || common.artist) {
            meta.title = common.title || parseFilename(f.name).title;
            meta.artist = common.artist || parseFilename(f.name).artist;
            meta.album = common.album || '';
            meta.genre = (common.genre && common.genre[0]) || '';
            if (common.picture && common.picture.length) {
              const pic = common.picture[0];
              const coverBlob = new Blob([pic.data], { type: pic.format || 'image/jpeg' });
              const coverKey = `cover-${Date.now()}-${Math.random().toString(36).slice(2,9)}`;
              await db.table('blobs').put({ key: coverKey, blob: coverBlob });
              meta.coverKey = coverKey;
            }
          }
        } catch (err) { console.warn('metadata parse failed', err); }
      }

      // if no title derived yet, parse from filename
      if (!meta.title) {
        const p = parseFilename(f.name);
        meta.title = p.title || '';
        meta.artist = p.artist || '';
      }

      // If metadata is still minimal (only filename), attempt online lookup via iTunes
      let itunesResult = null;
      if ((!meta.artist || !meta.title || meta.title === f.name) && (meta.title || meta.artist)) {
        itunesResult = await lookupItunes({ title: meta.title, artist: meta.artist });
      }

      if (itunesResult) {
        // ask user to accept or edit
        const accept = confirm(`Auto-fill found:\nTitle: ${itunesResult.title}\nArtist: ${itunesResult.artist}\nAlbum: ${itunesResult.album}\n\nPress OK to accept, Cancel to edit manually.`);
        if (accept) {
          // fetch artwork (if any) and save
          if (itunesResult.artwork) {
            const coverKey = await saveCoverFromUrl(itunesResult.artwork);
            meta.coverKey = coverKey;
          }
          meta.title = itunesResult.title || meta.title;
          meta.artist = itunesResult.artist || meta.artist;
          meta.album = itunesResult.album || meta.album;
          meta.genre = itunesResult.genre || meta.genre || '';
          // save
          await saveSongFile(f, meta);
          await loadAndRender(searchInput.value);
          continue;
        } else {
          // open edit modal prefilled with itunes data for manual adjustments (modal will save)
          await openEditModalWithFile(f, { title: itunesResult.title, artist: itunesResult.artist, album: itunesResult.album, genre: itunesResult.genre, artworkUrl: itunesResult.artwork });
          continue;
        }
      } else {
        // no online result -> if meta title/artist looks meaningless, prompt user to input
        const parsed = parseFilename(f.name);
        const fallbackMeaningful = parsed.title && parsed.title.length > 2 && parsed.title !== f.name;
        if (!fallbackMeaningful && (!meta.title || meta.title === f.name)) {
          // prompt user to edit before saving
          await openEditModalWithFile(f, {});
          continue;
        } else {
          // save with metadata we have
          await saveSongFile(f, meta);
          await loadAndRender(searchInput.value);
        }
      }
    } // for files
    await loadAndRender(searchInput.value);
  }

  // Modal: open edit modal to edit metadata for an existing song
  async function openEditModalForSong(songId) {
    const s = await db.table('songs').get(songId);
    if (!s) return;
    modalBackdrop.style.display='flex';
    metaTitle.value = s.title || '';
    metaArtist.value = s.artist || '';
    metaAlbum.value = s.album || '';
    metaGenre.value = s.genre || '';
    metaNotes.value = '';
    metaRemoveCover.checked = false;
    metaCoverInput.value = '';
    metaCoverPreview.src = '';
    if (s.coverKey) {
      const b = await getBlob(s.coverKey);
      if (b) { const url = URL.createObjectURL(b); metaCoverPreview.src = url; metaCoverPreview.onload=()=>URL.revokeObjectURL(url); }
    }
    modalSave.onclick = async () => {
      const updated = { title: metaTitle.value.trim(), artist: metaArtist.value.trim(), album: metaAlbum.value.trim(), genre: metaGenre.value.trim() };
      // handle cover replacement or removal
      if (metaCoverInput.files && metaCoverInput.files[0]) {
        // store new cover
        const file = metaCoverInput.files[0];
        const newKey = `cover-${Date.now()}-${Math.random().toString(36).slice(2,9)}`;
        await db.table('blobs').put({ key: newKey, blob: file });
        // delete old cover if exists
        if (s.coverKey) await deleteBlobKey(s.coverKey);
        updated.coverKey = newKey;
      } else if (metaRemoveCover.checked) {
        if (s.coverKey) await deleteBlobKey(s.coverKey);
        updated.coverKey = null;
      }
      await db.table('songs').update(songId, updated);
      modalBackdrop.style.display='none';
      await loadAndRender(searchInput.value);
    };
    modalCancel.onclick = ()=>{ modalBackdrop.style.display='none'; };
  }

  // Modal: open modal to edit metadata BEFORE saving a just-uploaded File (file not yet stored)
  // If artworkUrl provided, show preview and optionally fetch if user accepts on save.
  async function openEditModalWithFile(file, prefill={}) {
    modalBackdrop.style.display='flex';
    metaTitle.value = prefill.title || parseFilename(file.name).title || '';
    metaArtist.value = prefill.artist || parseFilename(file.name).artist || '';
    metaAlbum.value = prefill.album || '';
    metaGenre.value = prefill.genre || '';
    metaNotes.value = '';
    metaRemoveCover.checked = false;
    metaCoverInput.value = '';
    metaCoverPreview.src = '';
    if (prefill.artworkUrl) {
      metaCoverPreview.src = prefill.artworkUrl;
    }
    modalSave.onclick = async () => {
      const metadata = { title: metaTitle.value.trim(), artist: metaArtist.value.trim(), album: metaAlbum.value.trim(), genre: metaGenre.value.trim() };
      // save cover if provided in file input OR if artworkUrl present (fetch)
      if (metaCoverInput.files && metaCoverInput.files[0]) {
        const imgFile = metaCoverInput.files[0];
        const coverKey = `cover-${Date.now()}-${Math.random().toString(36).slice(2,9)}`;
        await db.table('blobs').put({ key: coverKey, blob: imgFile });
        metadata.coverKey = coverKey;
      } else if (prefill.artworkUrl && metaCoverPreview.src && metaCoverPreview.src.startsWith('http')) {
        const coverKey = await saveCoverFromUrl(prefill.artworkUrl);
        if (coverKey) metadata.coverKey = coverKey;
      }
      await saveSongFile(file, metadata);
      modalBackdrop.style.display='none';
      await loadAndRender(searchInput.value);
    };
    modalCancel.onclick = ()=>{ modalBackdrop.style.display='none'; };
  }

  // Delete song (and its blobs)
  async function deleteSong(songId) {
    if (!confirm('Delete this song from your local library? This will remove the audio and cover from IndexedDB.')) return;
    const s = await db.table('songs').get(songId);
    if (!s) return;
    // remove audio blob
    if (s.blobKey) await deleteBlobKey(s.blobKey);
    // remove cover
    if (s.coverKey) await deleteBlobKey(s.coverKey);
    await db.table('songs').delete(songId);
    if (currentSong && currentSong.id === songId) {
      audio.pause(); audio.src=''; currentSong = null;
      trackTitle.textContent=''; trackSub.textContent=''; coverWrap.innerHTML='';
    }
    await loadAndRender(searchInput.value);
  }

  // Playback: basic queue + play
  async function enqueueAndPlay(songId) {
    queue.push(songId); currentIndex = queue.length - 1;
    await playQueueIndex(currentIndex);
  }
  async function playQueueIndex(idx) {
    if (idx < 0 || idx >= queue.length) return;
    const songId = queue[idx];
    const s = await db.table('songs').get(songId);
    if (!s) return;
    currentSong = s;
    const blob = await getBlob(s.blobKey);
    if (!blob) return;
    if (coverWrap.firstChild) coverWrap.firstChild.remove();
    if (s.coverKey) { const b = await getBlob(s.coverKey); if (b){ const url = URL.createObjectURL(b); const img = document.createElement('img'); img.src=url; img.onload=()=>URL.revokeObjectURL(url); img.style.width='100%'; img.style.height='100%'; img.style.objectFit='cover'; coverWrap.appendChild(img); } }
    trackTitle.textContent = s.title; trackSub.textContent = `${s.artist || ''} • ${s.album || ''}`; nowPlaying.textContent = `${s.title} — ${s.artist || ''}`;
    // set audio src
    const url = URL.createObjectURL(blob);
    audio.src = url;
    ensureAudioContext();
    try { await audio.play(); playBtn.textContent = 'Pause'; } catch(e){ playBtn.textContent='Play'; }
    audio.addEventListener('timeupdate', ()=>{ if (!audio.duration) return; seek.value = (audio.currentTime/audio.duration)*100; }, {passive:true});
    audio.addEventListener('ended', async ()=>{ if (currentIndex < queue.length-1) { currentIndex++; await playQueueIndex(currentIndex); } else { playBtn.textContent='Play'; } });
    drawVisualizer();
  }
  // basic controls
  playBtn.addEventListener('click', async ()=>{ if (!audio.src) { if (queue.length) await playQueueIndex(currentIndex); else alert('Queue is empty — play a song from the list.'); return; } if (audio.paused) { await audioContext.resume().catch(()=>{}); await audio.play().catch(()=>{}); playBtn.textContent='Pause'; drawVisualizer(); } else { audio.pause(); playBtn.textContent='Play'; if (rafId) cancelAnimationFrame(rafId); } });
  prevBtn.addEventListener('click', ()=>{ if (currentIndex>0){ currentIndex--; playQueueIndex(currentIndex); } else audio.currentTime = 0; });
  nextBtn.addEventListener('click', ()=>{ if (currentIndex < queue.length-1) { currentIndex++; playQueueIndex(currentIndex); } });
  seek.addEventListener('input', ()=>{ if (!audio.duration) return; audio.currentTime = (seek.value/100)*audio.duration; });

  // simple visualizer
  function drawVisualizer(){
    if (!analyser) return;
    const buf = new Uint8Array(analyser.frequencyBinCount);
    function loop(){
      analyser.getByteFrequencyData(buf);
      vctx.clearRect(0,0,vizCanvas.width,vizCanvas.height);
      const w = vizCanvas.clientWidth;
      const h = vizCanvas.clientHeight;
      vizCanvas.width = Math.floor(w * devicePixelRatio);
      vizCanvas.height = Math.floor(h * devicePixelRatio);
      vctx.scale(devicePixelRatio, devicePixelRatio);
      const barWidth = (w / buf.length) * 2.5;
      let x=0;
      for (let i=0;i<buf.length;i++){
        const v = buf[i];
        const y = (v/255)*h;
        vctx.fillStyle = `hsl(${(i/buf.length)*320},80%,55%)`;
        vctx.fillRect(x, h-y, barWidth, y);
        x += barWidth+1;
      }
      rafId = requestAnimationFrame(loop);
    }
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  // Search input filter
  searchInput.addEventListener('input', ()=>{ renderList(allSongsCache, searchInput.value); });
  clearSearch.addEventListener('click', ()=>{ searchInput.value=''; renderList(allSongsCache,''); });

  // AI playlist (simple local heuristic; server optional)
  const genPlaylistBtn = document.getElementById('genPlaylist');
  const aiPlaylist = document.getElementById('aiPlaylist');
  genPlaylistBtn.addEventListener('click', async ()=>{
    aiPlaylist.innerHTML='';
    const mood = document.getElementById('moodSelect').value;
    const songs = await db.table('songs').toArray();
    const moodMap = {
      chill:['chill','ambient','lofi','mellow','downtempo'],
      energetic:['dance','electronic','upbeat','pop'],
      focus:['instrumental','classical','focus','ambient'],
      dance:['dance','electronic','club'],
      heavy:['metal','rock','heavy','hard'],
      moody:['moody','dark','goth','brooding','indie'],
      luveley:['love','lovely','romantic','soul','rnb','ballad','luveley'],
      dreamy:['dream','shoegaze','dreampop','ethereal'],
      aggressive:['punk','hardcore','angry'],
      mellow:['mellow','smooth','jazz','soul','chill']
    };
    const keywords = moodMap[mood] || [];
    let results = [];
    if (keywords.length){
      results = songs.filter(s=>{
        const hay = `${s.title} ${s.artist} ${s.album} ${s.genre}`.toLowerCase();
        return keywords.some(k => hay.includes(k));
      }).map(s=>s.id);
    }
    // fill with liked first then random
    const liked = songs.filter(s=>s.liked).map(s=>s.id).filter(id=>!results.includes(id));
    results = results.concat(liked);
    const remaining = songs.map(s=>s.id).filter(id=>!results.includes(id));
    while (results.length < 10 && remaining.length) {
      const i = Math.floor(Math.random()*remaining.length);
      results.push(remaining.splice(i,1)[0]);
    }
    for (const id of results.slice(0,10)) {
      const s = await db.table('songs').get(id);
      const li = document.createElement('li'); li.textContent = s ? `${s.title} — ${s.artist}`: `#${id}`; aiPlaylist.appendChild(li);
    }
  });

  // Lyrics fetch (fallback to lyrics.ovh)
  fetchLyrics.addEventListener('click', async ()=> {
    const lyricsDiv = document.getElementById('lyrics');
    if (!currentSong) { lyricsDiv.textContent='Load a track first.'; return; }
    lyricsDiv.textContent='Fetching lyrics...';
    try {
      const res = await fetch('/api/lyrics', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({artist:currentSong.artist,title:currentSong.title})});
      if (res.ok) {
        const j = await res.json();
        if (j.lyricsText) { lyricsDiv.textContent = j.lyricsText; return; }
      }
    } catch(e){}
    // fallback: lyrics.ovh
    try {
      const a = encodeURIComponent(currentSong.artist||'');
      const t = encodeURIComponent(currentSong.title||'');
      const r = await fetch(`https://api.lyrics.ovh/v1/${a}/${t}`);
      if (r.ok) {
        const j = await r.json();
        if (j.lyrics) { lyricsDiv.textContent = j.lyrics; return; }
      }
    } catch(e){}
    const pasted = prompt('Lyrics not found automatically. Paste lyrics here (OK to cancel):');
    if (pasted) document.getElementById('lyrics').textContent = pasted;
    else document.getElementById('lyrics').textContent = 'No lyrics available.';
  });

  // open app
  await loadAndRender();

  // Utility: open edit modal for new file (helper exposed to testing)
  window.__openEditForFile = openEditModalWithFile;

  console.info('EchoStream: search, auto-fill via iTunes, edit & delete enabled. Tips:\n- If iTunes auto-fill finds a match you will be prompted to accept or edit.\n- For privacy/production, use a server proxy for external APIs and keep keys server-side.');
  </script>
</body>
